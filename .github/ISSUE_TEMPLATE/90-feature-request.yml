name: "Request: Feature"
description: "Create a feature request."
title: "FEATURE TITLE"
labels: [enhancement, triage]
body:
- type: "markdown"
  attributes:
    value: |
      Welcome to Arconia Migrations! Please replace the **`FEATURE TITLE`** template above with a short title summarizing what the feature entails.
      ---
- type: "textarea"
  id: "what-happened"
  attributes:
    label: "Describe the problem/challenge you have"
    description: "A description of the current challenge that you are experiencing."
  validations:
    required: true
- type: "textarea"
  id: "what-expected"
  attributes:
    label: "Describe the solution you'd like"
    description: "A clear and concise description of what you want to happen. If applicable, include a visual representation."
  validations:
    required: true
- type: "textarea"
  id: "alternatives"
  attributes:
    label: "Describe alternatives you've considered"
    description: "Any alternative solutions or workarounds you've explored."
  validations:
    required: false
- type: "textarea"
  id: "additional-context"
  attributes:
    label: "Anything else you would like to add"
    description: "Additional information that will assist in handling the issue."
  validations:
    required: false
- type: "checkboxes"
  id: "sanity-check"
  attributes:
    label: "I assert that this issue is relevant for Arconia Migrations"
    options:
      - label: "I assert that this is a feature request and not a support request. If you need assistance, please use [GitHub Discussions](https://github.com/arconia-io/arconia-migrations/discussions)."
        required: true
      - label: "I assert that this is not a [duplicate of an existing issue](https://github.com/arconia-io/arconia-migrations/issues). "
        required: true
      - label: "I assert that I have read the [Arconia Code of Conduct](https://github.com/arconia-io/arconia-migrations/blob/main/CODE_OF_CONDUCT.md) and agree to abide by it."
        required: true
- type: "markdown"
  attributes:
    value: |
      Thank you for helping improve Arconia Migrations!
      ---
