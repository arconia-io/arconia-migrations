---
type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.UpgradeArconia_0_27
displayName: Migrate to Arconia 0.27
description: Migrate a Spring Boot application to the latest Arconia 0.27.x release.
tags:
  - arconia
recipeList:
  - io.arconia.rewrite.UpgradeArconia_0_26

  # Dependency Versions
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: io.arconia
      artifactId: "*"
      newVersion: 0.27.x

  # MULTITENANCY

  - io.arconia.rewrite.framework.multitenancy.UseTenantContextFilterBuilder

  # OBSERVABILITY

  # Dependency Changes
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: io.arconia
      oldArtifactId: arconia-langsmith-semantic-conventions
      newGroupId: io.arconia
      newArtifactId: arconia-opentelemetry-ai-semantic-conventions
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: io.arconia
      oldArtifactId: arconia-openinference-semantic-conventions
      newGroupId: io.arconia
      newArtifactId: arconia-openinference-ai-semantic-conventions

  # Rename Types
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.conventions.ObservationConventionsProvider
      newFullyQualifiedTypeName: io.arconia.observation.conventions.AiObservationConventionsProvider
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.autoconfigure.MultipleObservationConventionsException
      newFullyQualifiedTypeName: io.arconia.observation.autoconfigure.MultipleAiObservationConventionsException

  # Rename Types - OpenTelemetry GenAI
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.opentelemetry.instrumentation.genai.GenAiMoreIncubatingAttributes
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.instrumentation.shared.GenAiAttributes
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.opentelemetry.instrumentation.genai.OpenTelemetryGenAiContent
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.instrumentation.shared.GenAiContent
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.opentelemetry.instrumentation.genai.OpenTelemetryGenAiConventionsConverter
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.instrumentation.shared.GenAiConventionsConverter
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.opentelemetry.instrumentation.genai.OpenTelemetryEmbeddingModelMeterObservationHandler
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.instrumentation.opentelemetry.OpenTelemetryEmbeddingMeterObservationHandler
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.opentelemetry.instrumentation.genai.OpenTelemetryToolCallingModelObservationConvention
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.instrumentation.opentelemetry.OpenTelemetryToolCallingObservationConvention

  # Rename Types - LangSmith
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.langsmith.instrumentation.LangSmithAdvisorObservationConvention
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.instrumentation.langsmith.LangSmithAiAdvisorConvention
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.langsmith.instrumentation.LangSmithConventionsConverter
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.instrumentation.shared.GenAiConventionsConverter
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.langsmith.instrumentation.MicrometerBridge
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.instrumentation.shared.MicrometerBridge
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.arconia.observation.langsmith.autoconfigure.LangSmithConventionsAutoConfiguration
      newFullyQualifiedTypeName: io.arconia.observation.opentelemetry.ai.autoconfigure.LangSmithFlavorConfiguration

  # Rename Packages
  - org.openrewrite.java.ChangePackage:
      oldPackageName: io.arconia.observation.openinference.autoconfigure
      newPackageName: io.arconia.observation.openinference.ai.autoconfigure
  - org.openrewrite.java.ChangePackage:
      oldPackageName: io.arconia.observation.openinference.instrumentation
      newPackageName: io.arconia.observation.openinference.ai.instrumentation
  - org.openrewrite.java.ChangePackage:
      oldPackageName: io.arconia.observation.opentelemetry.instrumentation.genai
      newPackageName: io.arconia.observation.opentelemetry.ai.instrumentation.opentelemetry
  - org.openrewrite.java.ChangePackage:
      oldPackageName: io.arconia.observation.langsmith.instrumentation
      newPackageName: io.arconia.observation.opentelemetry.ai.instrumentation.langsmith

  # Rename Properties - OpenTelemetry
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.opentelemetry.generative-ai.enabled
      newPropertyKey: arconia.observations.conventions.opentelemetry.ai.enabled
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.opentelemetry.generative-ai.inference.capture-content
      newPropertyKey: arconia.observations.conventions.opentelemetry.ai.capture-content
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.opentelemetry.generative-ai.inference.include-tool-definitions
      newPropertyKey: arconia.observations.conventions.opentelemetry.ai.include-tool-definitions
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.opentelemetry.generative-ai.tool-execution.include-content
      newPropertyKey: arconia.observations.conventions.opentelemetry.ai.include-tool-call-content

  # Rename Properties - LangSmith
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKeyIfValue:
      oldPropertyKey: arconia.observations.conventions.type
      propertyValue: "langsmith"
      newPropertyKey: arconia.observations.conventions.opentelemetry.ai.flavor
  - io.arconia.rewrite.spring.boot.properties.ChangeSpringBootPropertyValue:
      propertyKey: arconia.observations.conventions.langsmith.inference.include-content
      oldPropertyValue: "true"
      newPropertyValue: "span-events"
  - io.arconia.rewrite.spring.boot.properties.ChangeSpringBootPropertyValue:
      propertyKey: arconia.observations.conventions.langsmith.inference.include-content
      oldPropertyValue: "false"
      newPropertyValue: "none"
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.langsmith.inference.include-content
      newPropertyKey: arconia.observations.conventions.opentelemetry.ai.capture-content
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.langsmith.inference.include-tool-definitions
      newPropertyKey: arconia.observations.conventions.opentelemetry.ai.include-tool-definitions
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.langsmith.tool-execution.include-content
      newPropertyKey: arconia.observations.conventions.opentelemetry.ai.include-tool-call-content

  # Rename Properties - OpenInference
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.base64-image-max-length
      newPropertyKey: arconia.observations.conventions.openinference.ai.base64-image-max-length
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-choices
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-choices
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-embeddings-text
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-embeddings-text
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-embeddings-vectors
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-embeddings-vectors
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-llm-invocation-parameters
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-llm-invocation-parameters
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-inputs
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-inputs
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-input-images
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-input-images
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-input-messages
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-input-messages
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-input-text
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-input-text
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-outputs
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-outputs
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-output-text
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-output-text
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-output-messages
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-output-messages
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.hide-prompts
      newPropertyKey: arconia.observations.conventions.openinference.ai.hide-prompts
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: arconia.observations.conventions.openinference.project-name
      newPropertyKey: arconia.observations.conventions.openinference.ai.project-name
