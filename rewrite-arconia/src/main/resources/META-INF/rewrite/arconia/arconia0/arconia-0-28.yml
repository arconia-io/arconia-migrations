  # Dependency Versions
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: io.arconia
      artifactId: "*"
      newVersion: 0.28.x

  # Dependency Changes
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: io.arconia
      oldArtifactId: arconia-kubernetes-service-binding
      newGroupId: org.springframework.cloud
      newArtifactId: spring-cloud-bindings
      newVersion: 2.0.4
      overrideManagedVersion: true
