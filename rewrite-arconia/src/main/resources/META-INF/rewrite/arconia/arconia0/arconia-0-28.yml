type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.framework.UpgradeArconia_0_28
displayName: Migrate to Arconia 0.28
description: Migrate a Spring Boot application to the latest Arconia 0.28.x release.
tags:
  - arconia
recipeList:
