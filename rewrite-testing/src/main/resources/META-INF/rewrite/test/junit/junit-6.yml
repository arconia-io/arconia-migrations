# Based on https://docs.junit.org/6.0.0/release-notes/, https://docs.junit.org/6.1.0/release-notes.html
---
type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.testing.junit.UpgradeJUnit_6
displayName: Migrate to JUnit 6.x
description: Migrate a Java application to the latest JUnit 6.x release.
tags:
  - junit
recipeList:

  # Dependency Changes
  - org.openrewrite.gradle.AddDependency:
      groupId: org.junit.platform
      artifactId: junit-platform-launcher
      configuration: testRuntimeOnly
      acceptTransitive: true
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: org.junit.platform
      artifactId: junit-platform-jfr
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: org.junit.platform
      artifactId: junit-platform-runner
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: org.junit.platform
      artifactId: junit-platform-suite-commons
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: org.junit.jupiter
      artifactId: junit-jupiter-migrationsupport

  # Dependency Versions
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.junit
      artifactId: junit-bom
      newVersion: 6.x
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.junit.jupiter
      artifactId: junit-jupiter*
      newVersion: 6.x

  # Plugin Versions
  - org.openrewrite.maven.UpgradePluginVersion:
      groupId: org.apache.maven.plugins
      artifactId: maven-surefire-plugin
      newVersion: 3.x
  - org.openrewrite.maven.UpgradePluginVersion:
      groupId: org.apache.maven.plugins
      artifactId: maven-failsafe-plugin
      newVersion: 3.x

  # Type Changes
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.jupiter.api.MethodOrderer$Alphanumeric
      newFullyQualifiedTypeName: org.junit.jupiter.api.MethodOrderer$MethodName
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.jupiter.engine.Constants
      newFullyQualifiedTypeName: org.junit.jupiter.api.Constants

  # Annotation Changes
  - org.openrewrite.java.RemoveAnnotation:
      annotationPattern: '@org.junit.platform.suite.api.UseTechnicalNames'
  - org.openrewrite.java.RemoveAnnotationAttribute:
      annotationType: org.junit.jupiter.params.provider.CsvFileSource
      attributeName: lineSeparator

  # Property Changes
  - org.openrewrite.properties.DeleteProperty:
      propertyKey: junit.jupiter.tempdir.scope
  - org.openrewrite.properties.DeleteProperty:
      propertyKey: junit.jupiter.params.arguments.conversion.locale.format

  # Method Changes
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: 'org.junit.platform.testkit.engine.Executions started()'
      newMethodName: finished
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: 'org.junit.jupiter.api.extension.ExtensionContext$Store getOrComputeIfAbsent(..)'
      newMethodName: computeIfAbsent
      matchOverrides: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: 'org.junit.platform.engine.support.store.NamespacedHierarchicalStore getOrComputeIfAbsent(..)'
      newMethodName: computeIfAbsent
      matchOverrides: true
