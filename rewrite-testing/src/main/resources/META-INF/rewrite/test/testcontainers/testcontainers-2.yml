type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.testing.testcontainers.MigrateCassandraContainer_2
displayName: Migrate Testcontainers `CassandraContainer` to the 2.x package
description: >-
  Moves `org.testcontainers.containers.CassandraContainer` to `org.testcontainers.cassandra.CassandraContainer`
  along with its supporting types (`CassandraDatabaseDelegate`, `CassandraQueryWaitStrategy`), and converts
  parameterised usages of the container to raw types.
tags:
  - testcontainers
recipeList:
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.testcontainers.containers.CassandraContainer
      newFullyQualifiedTypeName: org.testcontainers.cassandra.CassandraContainer
  - io.arconia.rewrite.testing.ConvertToRawType:
      fullyQualifiedTypeName: org.testcontainers.cassandra.CassandraContainer
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.testcontainers.containers.delegate.CassandraDatabaseDelegate
      newFullyQualifiedTypeName: org.testcontainers.cassandra.CassandraDatabaseDelegate
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.testcontainers.containers.wait.CassandraQueryWaitStrategy
      newFullyQualifiedTypeName: org.testcontainers.cassandra.CassandraQueryWaitStrategy

---
type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.testing.testcontainers.MigrateKafkaContainer_2
displayName: Migrate Testcontainers `KafkaContainer` to the Apache replacement
description: >-
  Migrates `org.testcontainers.containers.KafkaContainer` to `org.testcontainers.kafka.KafkaContainer`,
  rewriting any `confluentinc/cp-kafka` image into `apache/kafka-native:latest` and inserting an inline
  note pointing teams that want to stay on Confluent to `ConfluentKafkaContainer`.
tags:
  - testcontainers
recipeList:
  - io.arconia.rewrite.testing.testcontainers.ChangeContainerImageName:
      containerType: org.testcontainers.containers.KafkaContainer
      oldImagePrefix: confluentinc/cp-kafka
      newImageName: apache/kafka-native
      newImageTag: latest
      comment: "To keep using Confluent, switch to ConfluentKafkaContainer."
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.testcontainers.containers.KafkaContainer
      newFullyQualifiedTypeName: org.testcontainers.kafka.KafkaContainer
  - io.arconia.rewrite.testing.ConvertToRawType:
      fullyQualifiedTypeName: org.testcontainers.kafka.KafkaContainer
  - io.arconia.rewrite.testing.ConvertToRawType:
      fullyQualifiedTypeName: org.testcontainers.kafka.ConfluentKafkaContainer

---
type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.testing.testcontainers.MigrateLocalStackContainer_2
displayName: Migrate Testcontainers `LocalStackContainer` to the 2.x package and API
description: >-
  Migrates the legacy `org.testcontainers.containers.localstack.LocalStackContainer` to
  `org.testcontainers.localstack.LocalStackContainer`. Rewrites `Service` enum constants into the plain
  string names expected by `withServices(String...)`, collapses `getEndpointOverride(...)` into the
  unified no-arg `getEndpoint()`, and expands bare-tag constructor arguments into full image names so
  the 2.x constructor pulls the right image.
tags:
  - testcontainers
recipeList:
  - io.arconia.rewrite.testing.testcontainers.MigrateLocalStackServiceEnum_2
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.testcontainers.containers.localstack.LocalStackContainer getEndpointOverride(..)
      newMethodName: getEndpoint
  - org.openrewrite.java.DeleteMethodArgument:
      methodPattern: org.testcontainers.containers.localstack.LocalStackContainer getEndpoint(..)
      argumentIndex: 0
  - io.arconia.rewrite.testing.testcontainers.MigrateLocalStackImageArg
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.testcontainers.containers.localstack.LocalStackContainer
      newFullyQualifiedTypeName: org.testcontainers.localstack.LocalStackContainer
  - io.arconia.rewrite.testing.ConvertToRawType:
      fullyQualifiedTypeName: org.testcontainers.localstack.LocalStackContainer

---
type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.testing.testcontainers.MigrateLocalStackServiceEnum_2
displayName: Replace `LocalStackContainer.Service` enum constants with string literals
description: >-
  Rewrites references to the legacy `org.testcontainers.containers.localstack.LocalStackContainer.Service`
  enum constants into the plain string names expected by the Testcontainers 2.x `withServices(String...)` API.
tags:
  - testcontainers
recipeList:
  - org.openrewrite.java.ReplaceConstant:
      owningType: org.testcontainers.containers.localstack.LocalStackContainer.Service
      constantName: API_GATEWAY
      literalValue: '"apigateway"'
  - org.openrewrite.java.ReplaceConstant:
      owningType: org.testcontainers.containers.localstack.LocalStackContainer.Service
      constantName: EC2
      literalValue: '"ec2"'
  - org.openrewrite.java.ReplaceConstant:
      owningType: org.testcontainers.containers.localstack.LocalStackContainer.Service
      constantName: KINESIS
      literalValue: '"kinesis"'
  - org.openrewrite.java.ReplaceConstant:
      owningType: org.testcontainers.containers.localstack.LocalStackContainer.Service
      constantName: DYNAMODB
      literalValue: '"dynamodb"'
  - org.openrewrite.java.ReplaceConstant:
      owningType: org.testcontainers.containers.localstack.LocalStackContainer.Service
      constantName: DYNAMODB_STREAMS
      literalValue: '"dynamodbstreams"'
  - org.openrewrite.java.ReplaceConstant:
      owningType: org.testcontainers.containers.localstack.LocalStackContainer.Service
      constantName: S3
      literalValue: '"s3"'
  - org.openrewrite.java.ReplaceConstant:
      owningType: org.testcontainers.containers.localstack.LocalStackContainer.Service
      constantName: FIREHOSE
      literalValue: '"firehose"'
  - org.openrewrite.java.ReplaceConstant:
      owningType: org.testcontainers.containers.localstack.LocalStackContainer.Service
      constantName: LAMBDA
      literalValue: '"lambda"'
