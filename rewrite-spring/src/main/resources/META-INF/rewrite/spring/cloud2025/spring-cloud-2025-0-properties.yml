  # Spring Cloud Gateway proxy-exchange property migrations are guarded by the gateway artifact
  # in use, because `spring.cloud.gateway.proxy.*` maps to either the webmvc or webflux variant
  # depending on the project's runtime (the upstream metadata registers the same keys against
  # both modules).
  - io.arconia.rewrite.spring.cloud2025.MigrateGatewayProxyExchangeWebMvcProperties
  - io.arconia.rewrite.spring.cloud2025.MigrateGatewayProxyExchangeWebFluxProperties

---
type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.spring.cloud2025.MigrateGatewayProxyExchangeWebMvcProperties
displayName: Migrate Spring Cloud Gateway proxy properties to proxy-exchange.webmvc
description: Rename `spring.cloud.gateway.proxy.*` keys to `spring.cloud.gateway.proxy-exchange.webmvc.*` when the project depends on the Spring MVC variant of Spring Cloud Gateway.
tags:
  - spring
  - cloud
preconditions:
  - org.openrewrite.maven.search.FindDependency:
      groupId: org.springframework.cloud
      artifactId: spring-cloud-gateway-mvc
  - org.openrewrite.Singleton
recipeList:
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: "spring.cloud.gateway.proxy.auto-forward"
      newPropertyKey: "spring.cloud.gateway.proxy-exchange.webmvc.auto-forward"
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: "spring.cloud.gateway.proxy.headers"
      newPropertyKey: "spring.cloud.gateway.proxy-exchange.webmvc.headers"
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: "spring.cloud.gateway.proxy.sensitive"
      newPropertyKey: "spring.cloud.gateway.proxy-exchange.webmvc.sensitive"
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: "spring.cloud.gateway.proxy.skipped"
      newPropertyKey: "spring.cloud.gateway.proxy-exchange.webmvc.skipped"

---
