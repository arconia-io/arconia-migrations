---
type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.spring.boot4.UpgradeSpringBootProperties_4_1
displayName: Migrate Spring Boot properties to 4.1
description: Migrate Spring Boot configuration properties that were renamed or deprecated in the 4.1 release, across YAML and Properties configuration files.
tags:
  - spring
  - boot
preconditions:
  - org.openrewrite.Singleton
recipeList:
  - io.arconia.rewrite.spring.boot4.UpgradeSpringBootPropertiesGenerated_4_1

  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: logging.file.clean-history-on-start
      newPropertyKey: logging.logback.rollingpolicy.clean-history-on-start
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: logging.file.max-history
      newPropertyKey: logging.logback.rollingpolicy.max-history
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: logging.file.max-size
      newPropertyKey: logging.logback.rollingpolicy.max-file-size
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: logging.file.total-size-cap
      newPropertyKey: logging.logback.rollingpolicy.total-size-cap
  - io.arconia.rewrite.spring.boot.properties.RenameSpringBootPropertyKey:
      oldPropertyKey: logging.pattern.rolling-file-name
      newPropertyKey: logging.logback.rollingpolicy.file-name-pattern

  - io.arconia.rewrite.spring.boot.properties.CommentSpringBootProperty:
      propertyKey: spring.datasource.oracleucp.role-name
      comment: Deprecated property removed in Spring Boot 4.1.
