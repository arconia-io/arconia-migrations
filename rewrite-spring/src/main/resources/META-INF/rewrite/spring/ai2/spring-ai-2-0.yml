---
type: specs.openrewrite.org/v1beta/recipe
name: io.arconia.rewrite.spring.ai2.UpgradeSpringAi_2_0
displayName: Migrate to Spring AI 2.0
description: Migrate a Spring Boot application to the latest Spring AI 2.0.x release.
tags:
  - spring
  - ai
preconditions:
  - org.openrewrite.Singleton
recipeList:

  # Configuration Properties
  - io.arconia.rewrite.spring.ai2.UpgradeSpringAiProperties_2_0

  # Dependency Versions
